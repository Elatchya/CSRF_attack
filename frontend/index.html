<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Flood Prediction</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="app-container">

        <!-- Auth Section -->
        <div id="auth-section" class="glass-panel">
            <h2>System Access</h2>

            <div class="tabs">
                <button id="tab-login" class="active" onclick="switchTab('login')">Login</button>
                <button id="tab-register" onclick="switchTab('register')">Register</button>
            </div>

            <form id="login-form">
                <input type="text" id="login-user" placeholder="Username" required>
                <input type="password" id="login-pass" placeholder="Password" required>
                <button type="submit" class="btn-primary">Authenticate</button>
                <div id="login-msg" class="msg"></div>
            </form>

            <form id="register-form" style="display: none;">
                <input type="text" id="reg-user" placeholder="Username" required>
                <input type="password" id="reg-pass" placeholder="Password" required>

                <select id="reg-role">
                    <option value="User">Standard User</option>
                    <option value="Researcher">Researcher</option>
                    <option value="Admin">Admin</option>
                </select>

                <button type="submit" class="btn-primary">Create Identity</button>
                <div id="reg-msg" class="msg"></div>
            </form>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" class="glass-panel" style="display: none;">
            
            <div class="dash-header">
                <h2>Flood Risk Analysis Hub</h2>
                <div class="user-info">
                    <span id="user-badge"></span>
                    <button onclick="logout()" class="btn-secondary">Logout</button>
                </div>
            </div>

            <div class="dash-content">
                
                <!-- Prediction -->
                <div class="predict-form-container">
                    <h3>Submit Environmental Factors</h3>

                    <form id="predict-form">
                        <div class="input-grid" id="feature-inputs"></div>

                        <button type="submit" class="btn-primary" style="margin-top:20px; width:100%;">
                            Analyze Risk
                        </button>
                    </form>

                    <div id="predict-msg" class="msg"></div>
                </div>

                <!-- Results -->
                <div class="results-container">
                    <div class="risk-gauge">
                        <h3>Risk Level Assessment</h3>
                        <div id="risk-level-display" class="risk-indicator">--</div>
                        <div class="prob-text">
                            Probability: <span id="prob-num">0.00</span>
                        </div>
                    </div>

                    <div class="chart-container">
                        <canvas id="importanceChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 🔐 ADMIN LOGS SECTION -->
            <div id="logs-section" style="margin-top:30px; display:none;">
                <h3>Audit Logs (Admin Only)</h3>

                <button onclick="viewLogs()" class="btn-secondary" style="margin-bottom:10px;">
                    View Logs
                </button>

                <div id="logs-container" style="
                    max-height:300px;
                    overflow-y:auto;
                    background:#f8fafc;
                    padding:10px;
                    border-radius:8px;
                    color:#000;
                ">
                </div>
            </div>

        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
